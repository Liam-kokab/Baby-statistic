<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- soft pink background -->
  <circle cx="50" cy="50" r="49" fill="#fce4ec"/>

  <!-- 5 petals — alternating rose shades, centred on a ring at r=22 -->
  <circle cx="50" cy="28" r="14" fill="#f48fb1"/>
  <circle cx="71" cy="43" r="14" fill="#ec407a"/>
  <circle cx="63" cy="68" r="14" fill="#f48fb1"/>
  <circle cx="37" cy="68" r="14" fill="#ec407a"/>
  <circle cx="29" cy="43" r="14" fill="#f48fb1"/>

  <!-- white centre covering petal overlap -->
  <circle cx="50" cy="50" r="15" fill="#fff"/>

  <!-- golden stamen -->
  <circle cx="50" cy="50" r="8" fill="#fdd835"/>
  <circle cx="50" cy="50" r="4" fill="#f9a825"/>
</svg>
