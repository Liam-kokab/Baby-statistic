<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <rect width="390" height="844" fill="#f8f0f5"/>
  <!-- hero -->
  <rect width="390" height="160" fill="url(#heroGrad)"/>
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="60%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e8eaf6"/>
    </linearGradient>
  </defs>
  <text x="195" y="80" text-anchor="middle" font-size="40">🌸</text>
  <text x="195" y="115" text-anchor="middle" font-size="22" font-weight="900" fill="#880e4f" font-family="sans-serif">Baby Stats</text>
  <text x="195" y="138" text-anchor="middle" font-size="13" fill="#ad1457" font-family="sans-serif">Track every little moment 💕</text>

  <!-- sleep card -->
  <rect x="16" y="176" width="358" height="90" rx="16" fill="white" filter="url(#shadow)"/>
  <defs><filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/></filter></defs>
  <text x="32" y="200" font-size="13" font-weight="800" fill="#333" font-family="sans-serif">😴 SLEEP</text>
  <rect x="32" y="210" width="60" height="20" rx="10" fill="#fff8e1"/>
  <text x="62" y="224" text-anchor="middle" font-size="11" font-weight="800" fill="#f57f17" font-family="sans-serif">AWAKE</text>
  <text x="32" y="250" font-size="28" font-weight="900" fill="#222" font-family="sans-serif">01:23:45</text>
  <rect x="310" y="212" width="50" height="36" rx="12" fill="#ec407a"/>
  <text x="335" y="235" text-anchor="middle" font-size="12" fill="white" font-family="sans-serif">🌙 Start</text>

  <!-- milk card -->
  <rect x="16" y="280" width="358" height="80" rx="16" fill="white" filter="url(#shadow)"/>
  <text x="32" y="304" font-size="13" font-weight="800" fill="#333" font-family="sans-serif">🍼 MILK</text>
  <rect x="32" y="316" width="150" height="28" rx="8" fill="#f5f5f5"/>
  <text x="107" y="334" text-anchor="middle" font-size="12" fill="#666" font-family="sans-serif">Amount (ml)</text>
  <rect x="200" y="316" width="70" height="28" rx="8" fill="#ec407a"/>
  <text x="235" y="334" text-anchor="middle" font-size="11" fill="white" font-family="sans-serif">🧊 Fridge</text>
  <rect x="278" y="316" width="80" height="28" rx="8" fill="#7e57c2"/>
  <text x="318" y="334" text-anchor="middle" font-size="11" fill="white" font-family="sans-serif">❄️ Freezer</text>

  <!-- nappy card -->
  <rect x="16" y="376" width="358" height="72" rx="16" fill="white" filter="url(#shadow)"/>
  <text x="32" y="400" font-size="13" font-weight="800" fill="#333" font-family="sans-serif">🚽 NAPPY</text>
  <rect x="32" y="410" width="160" height="28" rx="8" fill="#fce4ec"/>
  <text x="112" y="428" text-anchor="middle" font-size="12" fill="#880e4f" font-family="sans-serif">Poop 💩</text>
  <rect x="204" y="410" width="160" height="28" rx="8" fill="#e3f2fd"/>
  <text x="284" y="428" text-anchor="middle" font-size="12" fill="#1565c0" font-family="sans-serif">Pee 💧</text>

  <!-- navbar -->
  <rect x="0" y="796" width="390" height="48" fill="white"/>
  <text x="48"  y="822" text-anchor="middle" font-size="20">🏠</text>
  <text x="136" y="822" text-anchor="middle" font-size="20">🧊</text>
  <text x="214" y="822" text-anchor="middle" font-size="20">🍼</text>
  <text x="292" y="822" text-anchor="middle" font-size="20">😴</text>
  <text x="342" y="822" text-anchor="middle" font-size="20">💩</text>
</svg>

