<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- pink background fills the entire safe zone (maskable) -->
  <rect width="100" height="100" fill="#fce4ec"/>

  <!-- petals, slightly smaller and centred to sit within the safe zone -->
  <circle cx="50" cy="31" r="12" fill="#f48fb1"/>
  <circle cx="68" cy="44" r="12" fill="#ec407a"/>
  <circle cx="61" cy="65" r="12" fill="#f48fb1"/>
  <circle cx="39" cy="65" r="12" fill="#ec407a"/>
  <circle cx="32" cy="44" r="12" fill="#f48fb1"/>

  <!-- white centre -->
  <circle cx="50" cy="50" r="13" fill="#fff"/>

  <!-- golden stamen -->
  <circle cx="50" cy="50" r="7" fill="#fdd835"/>
  <circle cx="50" cy="50" r="3.5" fill="#f9a825"/>
</svg>

